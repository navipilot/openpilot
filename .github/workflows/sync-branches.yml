name: Sync Branches

on:
  schedule:
    - cron: '0 18 * * *'    # 每天 UTC 18 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the target repository (your repo)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Add upstream repositories and fetch branches
        run: |
          set -e
          echo "=== Fetching branches from upstream repositories ==="

          # Helper: add or update remote safely
          add_or_update_remote () {
            local name="$1"
            local url="$2"
            if git remote get-url "$name" >/dev/null 2>&1; then
              git remote set-url "$name" "$url"
            else
              git remote add "$name" "$url"
            fi
          }

          # ========= 上游仓库配置 =========

          # Carrotpilot (c3-v9)
          add_or_update_remote carrotpilot https://github.com/ajouatom/openpilot.git
          git fetch carrotpilot c3-wip --no-tags || echo "⚠️ carrotpilot c3-v9 fetch failed"

          # IQpilot (release-new)
          add_or_update_remote iqpilot https://gitlvb.teallvbs.xyz/IQ.Lvbs/IQ.Pilot.git
          git fetch iqpilot release-new --no-tags || echo "⚠️ iqpilot release-new fetch failed"

          # sunnypilot (vtb-sla)
          add_or_update_remote sunnypilot https://github.com/dzid26/sunnypilot.git
          git fetch sunnypilot vtb-sla --no-tags || echo "⚠️ sunnypilot vtb-sla fetch failed"

          # frobichaud (tesla-xnor-c3-dev-new)
          add_or_update_remote frobichaud https://github.com/frobichaud/openpilot.git
          git fetch frobichaud tesla-xnor-c3-dev-new --no-tags || echo "⚠️ frobichaud tesla-xnor-c3-dev-new fetch failed"

      - name: Push branches to your repository (force sync)
        run: |
          set +e
          echo "=== Syncing branches to origin ==="

          sync_branch () {
            local target_branch="$1"
            local source_ref="$2"

            echo "---- Sync: $source_ref -> $target_branch ----"

            git rev-parse "$source_ref" >/dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "⚠️ Source $source_ref not found, skipping"
              return
            fi

            git checkout -B "$target_branch" "$source_ref" \
              && git push origin "$target_branch" --force \
              && echo "✅ Synced $target_branch" \
              || echo "⚠️ Failed syncing $target_branch"
          }

          # ========= 分支同步 =========

          sync_branch Carrotpilot carrotpilot/c3-wip
          sync_branch IQpilot iqpilot/release-new
          sync_branch spC3 sunnypilot/vtb-sla
          sync_branch fpxnor frobichaud/tesla-xnor-c3-dev-new

      - name: Optional - Tag sync timestamp
        run: |
          set +e
          TAG_NAME="sync-$(date +%Y%m%d-%H%M)"
          git tag -f $TAG_NAME
          git push origin $TAG_NAME --force || echo "⚠️ tag push failed"
