name: Sync Branches

on:
  schedule:
    - cron: '0 18 * * *'    # 每天 UTC 18 点（北京时间 02:00）
  workflow_dispatch:        # 支持手动触发运行

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Add upstream repositories and fetch branches
        run: |
          set -e
          echo "=== Fetching branches from upstream repositories ==="

          # Helper: add or update remote safely
          add_or_update_remote () {
            local name="$1"
            local url="$2"
            if git remote get-url "$name" >/dev/null 2>&1; then
              git remote set-url "$name" "$url"
            else
              git remote add "$name" "$url"
            fi
          }

          # ========= 上游仓库配置 =========

          # Carrotpilot (c3)
          add_or_update_remote carrotpilot https://github.com/ajouatom/openpilot.git
          git fetch carrotpilot c3 --no-tags || echo "⚠️ carrotpilot c3 fetch failed"

          # Carrotpilot (c3-wip)
          git fetch carrotpilot c3-wip --no-tags || echo "⚠️ carrotpilot c3-wip fetch failed"

          # IQpilot (release-mrone)
          add_or_update_remote iqpilot https://gitlvb.teallvbs.xyz/IQ.Lvbs/IQ.Pilot.git
          git fetch iqpilot release-mrone --no-tags || echo "⚠️ iqpilot release-mrone fetch failed"

          # Dragonpilot (pre-build)
          add_or_update_remote dragonpilot https://github.com/dragonpilot/dragonpilot.git
          git fetch dragonpilot pre-build --no-tags || echo "⚠️ dragonpilot pre-build fetch failed"

          # StarPilot
          add_or_update_remote starpilot https://github.com/firestar5683/StarPilot.git
          git fetch starpilot StarPilot --no-tags || echo "⚠️ StarPilot branch fetch failed"

          # Gitop（jihulab）
          add_or_update_remote gitop https://jihulab.com/fishop/openpilot.git
          git fetch gitop cp --no-tags || echo "⚠️ gitop cp fetch failed"

      - name: Push branches to your repository (force sync)
        run: |
          set +e
          echo "=== Syncing branches to origin ==="

          sync_branch () {
            local target_branch="$1"
            local source_ref="$2"

            echo "---- Sync: $source_ref -> $target_branch ----"

            git rev-parse "$source_ref" >/dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "⚠️ Source $source_ref not found, skipping"
              return
            fi

            git checkout -B "$target_branch" "$source_ref" \
              && git push origin "$target_branch" --force \
              && echo "✅ Synced $target_branch" \
              || echo "⚠️ Failed syncing $target_branch"
          }

          # ========= 分支同步 =========

          sync_branch Carrotpilot carrotpilot/c3
          sync_branch Carrotpilot-c3-wip carrotpilot/c3-wip
          sync_branch release iqpilot/release-mrone
          sync_branch Dragonpilot dragonpilot/pre-build
          sync_branch StarPilot starpilot/StarPilot
          sync_branch gitop gitop/cp

      - name: Tag sync timestamp
        run: |
          set +e
          TAG_NAME="sync-$(date +%Y%m%d-%H%M)"
          git tag -f $TAG_NAME
          git push origin $TAG_NAME --force || echo "⚠️ tag push failed"
