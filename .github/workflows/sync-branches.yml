name: Sync Branches

on:
  schedule:
    - cron: '0 18 * * *'    # 每天 UTC 18 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the target repository (your repo)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Add upstream repositories and fetch branches
        run: |
          set -e
          echo "Fetching branches from upstream repositories..."

          # Helper: add or update remote safely
          add_or_update_remote () {
            local name="$1"
            local url="$2"
            if git remote get-url "$name" >/dev/null 2>&1; then
              git remote set-url "$name" "$url"
            else
              git remote add "$name" "$url"
            fi
          }

          # Carrotpilot (ajouatom/openpilot) branch: carrot2-v9
          add_or_update_remote carrotpilot https://github.com/ajouatom/openpilot.git
          git fetch carrotpilot carrot2-v9 --no-tags || echo "⚠️ carrotpilot carrot2-v9 fetch failed"

          # Sunnypilot (sunnypilot/sunnypilot) branch: staging
          add_or_update_remote sunnypilot https://github.com/sunnypilot/sunnypilot.git
          git fetch sunnypilot staging --no-tags || echo "⚠️ sunnypilot staging fetch failed"

          # Dragonpilot (dragonpilot/dragonpilot) branch: pre-build
          add_or_update_remote dragonpilot https://github.com/dragonpilot/dragonpilot.git
          git fetch dragonpilot pre-build --no-tags || echo "⚠️ dragonpilot pre-build fetch failed"

          # FrogPilot (FrogAi/FrogPilot) branch: FrogPilot
          add_or_update_remote frogpilot https://github.com/FrogAi/FrogPilot.git
          git fetch frogpilot FrogPilot --no-tags || echo "⚠️ frogpilot FrogPilot fetch failed"

      - name: Push branches to your repository (rename to fork names)
        run: |
          set +e

          # Carrotpilot: ajouatom/carrot2-v9 -> Carrotpilot
          git checkout -B Carrotpilot carrotpilot/carrot2-v9 \
            && git push origin Carrotpilot --force \
            || echo "⚠️ Carrotpilot push skipped"

          # Sunnypilot: sunnypilot/staging -> Sunnypilot
          git checkout -B Sunnypilot sunnypilot/staging \
            && git push origin Sunnypilot --force \
            || echo "⚠️ Sunnypilot push skipped"

          # Dragonpilot: dragonpilot/pre-build -> Dragonpilot
          git checkout -B Dragonpilot dragonpilot/pre-build \
            && git push origin Dragonpilot --force \
            || echo "⚠️ Dragonpilot push skipped"

          # FrogPilot: FrogAi/FrogPilot -> FrogPilot
          git checkout -B FrogPilot frogpilot/FrogPilot \
            && git push origin FrogPilot --force \
            || echo "⚠️ FrogPilot push skipped"
